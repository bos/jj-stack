name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        jj-version: ["v0.39.0", "v0.40.0"]
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.14"]
    runs-on: ${{ matrix.os }}
    env:
      JJ_VERSION: ${{ matrix.jj-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install jj
        run: echo "$(tools/install-jj-release.sh "$JJ_VERSION")" >> "$GITHUB_PATH"

      - name: Run local verification suite
        run: ./check.py

  submit-property-smoke:
    runs-on: ubuntu-latest
    env:
      JJ_VERSION: v0.40.0

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"

      - name: Install jj
        run: echo "$(tools/install-jj-release.sh "$JJ_VERSION")" >> "$GITHUB_PATH"

      - name: Run submit property smoke scenarios
        run: tests/run_submit_property_scenarios.py 8 -n auto
