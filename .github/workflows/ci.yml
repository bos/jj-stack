name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        jj-version: ["v0.41.0", "v0.42.0", "v0.43.0"]
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]
    runs-on: ${{ matrix.os }}
    env:
      JJ_VERSION: ${{ matrix.jj-version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install jj
        shell: bash
        run: |
          install_dir="$(tools/install-jj-release.sh "$JJ_VERSION")"
          if command -v cygpath >/dev/null 2>&1; then
            install_dir="$(cygpath -w "$install_dir")"
          fi
          printf '%s\n' "$install_dir" >> "$GITHUB_PATH"

      - name: Run local verification suite
        shell: bash
        run: ./check.py

  submit-property-smoke:
    runs-on: ubuntu-latest
    env:
      JJ_VERSION: v0.42.0

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"

      - name: Install jj
        run: echo "$(tools/install-jj-release.sh "$JJ_VERSION")" >> "$GITHUB_PATH"

      - name: Run submit property smoke scenarios
        run: >-
          tests/run_submit_property_scenarios.py 10 --random-seed -n auto
          --cross-stack-scenarios 5
          --stack-merge-scenarios 5
          --stack-move-scenarios 5
          --retry-scenarios 5
          --drift-scenarios 21
          --land-scenarios 21
          --land-drift-scenarios 7
          --land-retry-scenarios 5
          --land-handoff-scenarios 6
